# Android
# Build your Android project with Gradle.
# Add steps that test, sign, and distribute the APK, save build artifacts, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/android
resources:
  repositories:
  - repository: Scadup # The name used to reference this repository in the checkout step
    type: github
    endpoint: tsymiar
    name: tsymiar/scadup

trigger:
- main

pool:
  vmImage: 'macos-latest'

steps:
- checkout: Scadup
- checkout: self

- task: CopyFiles@2
  inputs:
    SourceFolder: 'Scadup'
    Contents: '**'
    TargetFolder: 'Device2Device/app/src/main/cpp/scadup'
    OverWrite: true

- script: |
    echo "Installing required Android SDK components..."
    SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
    if [ ! -f "$SDKMANAGER" ]; then
      SDKMANAGER="${ANDROID_HOME}/tools/bin/sdkmanager"
    fi
    yes | $SDKMANAGER --licenses 2>/dev/null || true
    $SDKMANAGER "ndk;23.0.7599858" "build-tools;30.0.3" "platforms;android-31"
  displayName: 'Install Android SDK components'

- script: |
    echo "##vso[task.setvariable variable=ANDROID_NDK_HOME]${ANDROID_HOME}/ndk/23.0.7599858"
  displayName: 'Set NDK environment'

- task: JavaToolInstaller@0
  inputs:
    versionSpec: '11'
    jdkArchitectureOption: 'x64'
    jdkSourceOption: 'PreInstalled'
  displayName: 'Use JDK 11'

- script: pwd && ls -al
  workingDirectory: 'Device2Device/app/src/main/cpp'
  displayName: 'Verify project files'

- script: |
    GRADLE_VERSION=7.0.2
    GRADLE_ZIP=gradle-${GRADLE_VERSION}-bin.zip
    curl -sL https://services.gradle.org/distributions/${GRADLE_ZIP} -o ${GRADLE_ZIP}
    unzip -qo ${GRADLE_ZIP}
    export GRADLE_HOME=$(pwd)/gradle-${GRADLE_VERSION}
    export PATH=${GRADLE_HOME}/bin:${PATH}
    gradle --version
    gradle assembleDebug --no-daemon --stacktrace
  workingDirectory: 'Device2Device'
  displayName: 'gradle assembleDebug'
